version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: walletlens-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-walletlens_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-walletlens_password}
      POSTGRES_DB: ${POSTGRES_DB:-walletlens}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: walletlens-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local